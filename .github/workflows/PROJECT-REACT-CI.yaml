name: PROJECT-REACT-CI

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/PROJECT-REACT-CI.yaml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/PROJECT-REACT-CI.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
