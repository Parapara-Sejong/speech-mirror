# GitHub Issue 생성/편집 시 브랜치명과 커밋 메시지 템플릿을 자동으로 댓글로 생성합니다.
#
# 토큰 설정:
#   - Public 레포: GITHUB_TOKEN 자동 사용
#   - Private 레포: _GITHUB_PAT_TOKEN 시크릿 등록 권장

name: Issue Branch Suggestion

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  generate-comment:
    if: github.event.action == 'opened' || (github.event.action == 'edited' && github.event.changes.title)
    runs-on: ubuntu-latest
    steps:
      - name: Generate Branch & Commit Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets._GITHUB_PAT_TOKEN || github.token }}
          script: |
            const commentMarker = "<!-- 이 댓글은 issue-branch-suggestion에 의해 자동으로 생성되었습니다. -->";
            const branchPrefix = "";
            const maxBranchLength = 100;
            const commitTemplate = "${issueTitle} : feat : {변경 사항에 대한 설명} ${issueUrl}";

            const issue = context.payload.issue;
            const issueUrl = issue.html_url;
            const issueNumber = String(issue.number);
            const rawTitle = issue.title;

            const extractIssueTitle = (title) => {
              const withoutTags = title.replace(/\[.*?]/g, "").trim();
              const withoutEmoji = withoutTags.replace(/\p{So}|\p{C}|\uFE0F|\u200D/gu, "").trim();
              return withoutEmoji.length > 0 ? withoutEmoji : title.trim();
            };

            const formatDateYYYYMMDD = (date) => {
              const yyyy = date.getFullYear();
              const mm = String(date.getMonth() + 1).padStart(2, "0");
              const dd = String(date.getDate()).padStart(2, "0");
              return `${yyyy}${mm}${dd}`;
            };

            const normalizeTitle = (title) => title
              .replace(/[^a-zA-Z0-9가-힣]/gu, "_")
              .replace(/_+/g, "_")
              .replace(/^_+|_+$/g, "");

            const title = extractIssueTitle(rawTitle);
            const dateYYYYMMDD = formatDateYYYYMMDD(new Date());
            const normalizedTitle = normalizeTitle(title);
            const baseBranchName = `${dateYYYYMMDD}_#${issueNumber}_${normalizedTitle}`;
            const branchName = `${branchPrefix}${baseBranchName.slice(0, maxBranchLength)}`;
            const commitMessage = commitTemplate
              .replace(/\$\{issueTitle}/g, title)
              .replace(/\$\{issueUrl}/g, issueUrl)
              .replace(/\$\{issueNumber}/g, issueNumber)
              .replace(/\$\{branchName}/g, branchName)
              .replace(/\$\{date}/g, dateYYYYMMDD)
              .trim();

            const body = [
              commentMarker,
              "",
              "### 브랜치",
              "```",
              branchName,
              "```",
              "",
              "### 커밋 메시지",
              "```",
              commitMessage,
              "```",
              "",
              commentMarker,
            ].join("\n");

            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              typeof comment.body === "string" && comment.body.includes(commentMarker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
            }
